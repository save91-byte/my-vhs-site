<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVE | VHS ARCHIVE ADMIN</title>
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <style>
        :root { --accent: #ff4500; --card-bg: rgba(15, 15, 15, 0.95); --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--text); background: url('bg.jpg') #111 no-repeat center center fixed; background-size: cover; }
        nav { background: rgba(0,0,0,0.9); padding: 15px; border-bottom: 2px solid var(--accent); text-align: center; position: sticky; top: 0; z-index: 100; }
        nav a { color: #fff; text-decoration: none; margin: 0 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        
        header { text-align: center; padding: 30px 20px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .logo { font-size: 5rem; letter-spacing: 5px; margin: 0; font-weight: 900; text-transform: uppercase; color: #fff; text-shadow: 2px 2px 0 #000, 0 0 20px rgba(255, 69, 0, 0.7); line-height: 1; }
        .bulb { font-size: 4rem; color: var(--accent); animation: pulse 2s infinite alternate; text-shadow: 0 0 15px var(--accent); }
        @keyframes pulse { from { opacity: 0.5; text-shadow: 0 0 5px var(--accent); } to { opacity: 1; text-shadow: 0 0 25px var(--accent); } }

        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .section-title { background: var(--accent); display: inline-block; padding: 6px 15px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; box-shadow: 4px 4px 0 #000; }

        /* ВИДЕО */
        .main-video-container { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 30px; }
        .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .video-item { background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #333; position: relative; transition: 0.3s; height: 180px; }
        .video-item:hover { border-color: var(--accent); transform: translateY(-5px); }
        .mini-player { width: 100%; height: 100%; border: none; pointer-events: none; opacity: 0.8; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }

        /* КНОПКИ УДАЛЕНИЯ */
        .del-v { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; z-index: 20; display: none; font-weight: bold; }
        .del-p { float: right; background: none; border: 1px solid red; color: red; cursor: pointer; display: none; padding: 2px 8px; font-size: 0.7rem; border-radius: 4px; }
        body.admin-mode .del-v, body.admin-mode .del-p { display: block; }

        /* НОВОСТИ */
        .news-feed { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #333; }
        .post { background: #000; border: 1px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; position: relative; }
        .post-time { color: var(--accent); font-size: 0.7rem; font-weight: bold; }

        /* САЙДБАР */
        .sidebar-box { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .chat-area { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.6); padding: 10px; font-size: 0.85rem; border-radius: 8px; border: 1px solid #222; }
        .input-group { display: flex; gap: 8px; margin-top: 10px; }
        .input-group input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; }
        .input-group button { background: var(--accent); border: none; color: white; padding: 0 12px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        /* АДМИН ПАНЕЛЬ */
        #adminBar { position: fixed; top: 0; left: 0; width: 100%; background: var(--accent); color: white; padding: 8px; text-align: center; z-index: 2000; display: none; font-weight: bold; }
        #adminBar button { background: white; border: none; margin-left: 10px; cursor: pointer; padding: 3px 12px; font-weight: bold; border-radius: 4px; }

        /* DENDY КНОПКА */
        .nes-toggle { position: fixed; left: 20px; bottom: 20px; background: var(--accent); color: white; border: 2px solid #fff; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; z-index: 1001; font-size: 1.5rem; }
        #nes-sidebar { position: fixed; left: -400px; top: 0; width: 380px; height: 100%; background: #151515; border-right: 4px solid var(--accent); z-index: 1000; transition: 0.5s; padding: 20px; }
        #nes-sidebar.active { left: 0; }
        #nes-canvas { width: 100%; background: #000; image-rendering: pixelated; }

        @media (max-width: 950px) { .main-layout { grid-template-columns: 1fr; } .logo { font-size: 3rem; } }
    </style>
</head>
<body id="mainBody">

    <div id="adminBar">
        🔧 РЕЖИМ ПРАВКИ | 
        <button onclick="addNewVideo()">+ КАССЕТА</button>
        <button onclick="addPost()">+ ПОСТ</button>
        <button onclick="resetAll()" style="background: #000; color: #fff;">СБРОС КЭША</button>
        <button onclick="location.reload()">ВЫХОД</button>
    </div>

    <button class="nes-toggle" onclick="toggleNES()">🎮</button>

    <div id="nes-sidebar">
        <h2 style="color:var(--accent); text-align:center;">DENDY</h2>
        <canvas id="nes-canvas" width="256" height="240"></canvas>
        <button style="width:100%; margin-top:10px; padding:10px; cursor:pointer;" onclick="startNesGame('Contra.nes')">CONTRA</button>
    </div>

    <nav><a href="#archive">АРХИВ</a> <a href="#news">НОВОСТИ</a></nav>
    
    <header>
        <span class="bulb">💡</span>
        <h1 class="logo">SAVE</h1>
    </header>

    <div class="main-layout">
        <main>
            <section id="archive">
                <div class="section-title">Плеер</div>
                <div class="main-video-container">
                    <div class="video-wrap">
                        <iframe id="mainPlayer" src="" allowFullScreen></iframe>
                    </div>
                </div>
                
                <div class="section-title">Кассеты</div>
                <div class="video-grid" id="videoGrid"></div>
            </section>

            <section id="news">
                <div class="section-title">Новости</div>
                <div id="newsFeed" class="news-feed"></div>
            </section>
        </main>

        <aside>
            <div class="sidebar-box">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">НИКНЕЙМ</div>
                <div class="input-group">
                    <input type="text" id="userNameInput" placeholder="Ник...">
                    <button onclick="setUser()">OK</button>
                </div>
            </div>
            
            <div class="sidebar-box">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">ЧАТ</div>
                <div id="chatWindow" class="chat-area"></div>
                <div class="input-group">
                    <input type="text" id="chatInput" placeholder="Текст..." onkeypress="if(event.keyCode==13) sendMessage()">
                    <button onclick="sendMessage()">➤</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const ADMIN_LOGIN = "SAVE", ADMIN_PASS = "90s";

        // ДАННЫЕ
        let vhsBox = JSON.parse(localStorage.getItem('vhs_box')) || [
            { type: 'rutube', id: '5f10027e2df6f3a60796ec5750ae8255' },
            { type: 'youtube', id: 'dQw4w9WgXcQ' }
        ];
        let posts = JSON.parse(localStorage.getItem('vhs_posts')) || [{time:'01.03.2026', text:'Добро пожаловать в SAVE.'}];
        let chatLogs = JSON.parse(localStorage.getItem('vhs_chat')) || [];
        let userNick = localStorage.getItem('vhs_user') || "Гость";
        let isAdmin = false;

        // --- ВИДЕО ---
        function renderArchive() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = vhsBox.map((v, i) => `
                <div class="video-item">
                    <button class="del-v" onclick="deleteVideo(${i})">×</button>
                    <div class="click-layer" onclick="changeVideo('${v.type === 'youtube' ? 'https://www.youtube.com/embed/'+v.id : 'https://rutube.ru/play/embed/'+v.id+'/'}')"></div>
                    <iframe class="mini-player" src="${v.type === 'youtube' ? 'https://www.youtube.com/embed/'+v.id : 'https://rutube.ru/play/embed/'+v.id+'/'}"></iframe>
                </div>`).join('');
            if(vhsBox.length > 0 && !document.getElementById('mainPlayer').src) {
                changeVideo(vhsBox[0].type === 'youtube' ? 'https://www.youtube.com/embed/'+vhsBox[0].id : 'https://rutube.ru/play/embed/'+vhsBox[0].id+'/');
            }
        }

        function changeVideo(url) { document.getElementById('mainPlayer').src = url; }

        function deleteVideo(i) {
            if(confirm("Удалить видео?")) { vhsBox.splice(i, 1); saveAndRender(); }
        }

        function addNewVideo() {
            let link = prompt("Ссылка (YouTube/Rutube):");
            if(!link) return;
            let vid = { type: '', id: '' };
            if(link.includes('youtube.com') || link.includes('youtu.be')) {
                vid.type = 'youtube'; vid.id = link.includes('v=') ? link.split('v=')[1].split('&')[0] : link.split('/').pop();
            } else if(link.includes('rutube.ru')) {
                vid.type = 'rutube'; vid.id = link.split('/video/')[1].replace('/', '');
            }
            if(vid.id) { vhsBox.push(vid); saveAndRender(); }
        }

        // --- НОВОСТИ ---
        function renderPosts() {
            document.getElementById('newsFeed').innerHTML = posts.map((p, i) => `
                <div class="post">
                    <button class="del-p" onclick="deletePost(${i})">Удалить</button>
                    <span class="post-time">${p.time}</span><br>${p.text}
                </div>`).reverse().join('');
        }

        function addPost() {
            let t = prompt("Текст:");
            if(t) { posts.push({time: new Date().toLocaleString(), text: t}); saveAndRender(); }
        }

        function deletePost(i) {
            if(confirm("Удалить новость?")) { posts.splice(i, 1); saveAndRender(); }
        }

        // --- АДМИНКА ---
        function setUser() {
            let val = document.getElementById('userNameInput').value.trim();
            if(val === ADMIN_LOGIN) {
                if(prompt("ПАРОЛЬ:") === ADMIN_PASS) {
                    isAdmin = true;
                    document.getElementById('adminBar').style.display = 'block';
                    document.body.classList.add('admin-mode');
                    userNick = "ADMIN";
                    renderArchive(); renderPosts();
                }
            } else if(val) { userNick = val; localStorage.setItem('vhs_user', userNick); }
        }

        function saveAndRender() {
            localStorage.setItem('vhs_box', JSON.stringify(vhsBox));
            localStorage.setItem('vhs_posts', JSON.stringify(posts));
            renderArchive(); renderPosts();
        }

        // --- ЧАТ ---
        function renderChat() {
            document.getElementById('chatWindow').innerHTML = chatLogs.map(m => `<div><b>${m.u}:</b> ${m.t}</div>`).join('');
            document.getElementById('chatWindow').scrollTop = document.getElementById('chatWindow').scrollHeight;
        }

        function sendMessage() {
            let i = document.getElementById('chatInput');
            if(i.value.trim()) {
                chatLogs.push({u: userNick, t: i.value});
                if(chatLogs.length > 50) chatLogs.shift();
                localStorage.setItem('vhs_chat', JSON.stringify(chatLogs));
                renderChat(); i.value = "";
            }
        }

        function resetAll() { if(confirm("Очистить память сайта?")) { localStorage.clear(); location.reload(); } }

        // --- DENDY ---
        var nes = new jsnes.NES({ onFrame: (buf) => {
            var ctx = document.getElementById('nes-canvas').getContext('2d');
            var img = ctx.getImageData(0,0,256,240);
            var b32 = new Uint32Array(img.data.buffer);
            for(var i=0; i<256*240; ++i) b32[i] = 0xFF000000 | buf[i];
            ctx.putImageData(img,0,0);
        }});
        function toggleNES() { document.getElementById('nes-sidebar').classList.toggle('active'); }
        function startNesGame(u) { var x = new XMLHttpRequest(); x.open("GET", u, true); x.overrideMimeType("text/plain; charset=x-user-defined"); x.onload = function() { nes.loadROM(this.responseText); setInterval(()=>nes.frame(), 16); }; x.send(); }
        const k = {38:4,40:5,37:6,39:7,88:0,90:1,16:2,13:3};
        window.onkeydown=(e)=>{if(k[e.keyCode]!==undefined){nes.buttonDown(1,k[e.keyCode]); e.preventDefault();}};
        window.onkeyup=(e)=>{if(k[e.keyCode]!==undefined)nes.buttonUp(1,k[e.keyCode]);};

        renderArchive(); renderPosts(); renderChat();
    </script>
</body>
</html>
