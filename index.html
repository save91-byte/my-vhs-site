<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVE | VHS & NEWS</title>
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <style>
        :root { --accent: #ff4500; --card-bg: rgba(15, 15, 15, 0.95); --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--text); background: url('bg.jpg') #111 no-repeat center center fixed; background-size: cover; }
        nav { background: rgba(0,0,0,0.9); padding: 15px; border-bottom: 2px solid var(--accent); text-align: center; position: sticky; top: 0; z-index: 100; }
        nav a { color: #fff; text-decoration: none; margin: 0 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        header { text-align: center; padding: 25px; }
        .logo { font-size: 3.5rem; letter-spacing: 10px; margin: 0; font-weight: 900; text-shadow: 0 0 20px rgba(255,69,0,0.5); }

        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .section-title { background: var(--accent); display: inline-block; padding: 6px 15px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }

        /* ВИДЕО */
        .main-video-container { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 30px; }
        .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .video-item { background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #333; position: relative; transition: 0.3s; }
        .video-item:hover { border-color: var(--accent); }
        .mini-player { width: 100%; height: 160px; border: none; pointer-events: none; opacity: 0.8; }
        .click-layer { position: absolute; bottom: 0; left: 0; width: 100%; height: 75%; z-index: 10; cursor: pointer; }

        /* НОВОСТИ */
        .news-feed { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #333; }
        .post { background: #000; border: 1px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; line-height: 1.6; }
        .post-time { color: var(--accent); font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; display: block; }

        /* САЙДБАР */
        .sidebar-box { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .chat-area { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.6); padding: 10px; font-size: 0.85rem; border-radius: 8px; }
        .input-group { display: flex; gap: 8px; margin-top: 10px; }
        .input-group input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; }
        .input-group button { background: var(--accent); border: none; color: white; padding: 0 12px; border-radius: 4px; cursor: pointer; }

        /* АДМИНКА */
        #adminBar { position: fixed; top: 0; left: 0; width: 100%; background: var(--accent); color: white; padding: 5px; text-align: center; z-index: 1000; display: none; font-weight: bold; font-size: 0.8rem; box-shadow: 0 5px 15px #000; }
        #adminBar button { background: white; border: none; margin-left: 10px; cursor: pointer; padding: 2px 12px; font-weight: bold; border-radius: 3px; }

        /* DENDY */
        #nes-sidebar { position: fixed; left: -400px; top: 0; width: 380px; height: 100%; background: #151515; border-right: 4px solid var(--accent); z-index: 1000; transition: 0.5s; padding: 20px; }
        #nes-sidebar.active { left: 0; box-shadow: 10px 0 50px #000; }
        .nes-toggle { position: fixed; left: 20px; bottom: 20px; background: var(--accent); color: white; border: 2px solid #fff; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; z-index: 1001; font-size: 1.5rem; }
        #nes-canvas { width: 100%; background: #000; image-rendering: pixelated; }

        @media (max-width: 950px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="adminBar">
        🔐 ADMIN ACTIVE | 
        <button onclick="addPost()">НОВЫЙ ПОСТ</button>
        <button onclick="resetAll()">СБРОС КЭША</button>
        <button onclick="location.reload()" style="background:transparent; color:white; border:1px solid white;">ВЫХОД</button>
    </div>

    <button class="nes-toggle" onclick="toggleNES()">🎮</button>

    <div id="nes-sidebar">
        <h2 style="color:var(--accent); text-align:center;">DENDY ZONE</h2>
        <canvas id="nes-canvas" width="256" height="240"></canvas>
        <button style="width:100%; margin-top:10px; padding:10px; font-weight:bold; cursor:pointer;" onclick="startNesGame('Contra.nes')">CONTRA</button>
        <button onclick="toggleNES()" style="width:100%; margin-top:20px; color:gray; background:none; border:none; cursor:pointer;">ЗАКРЫТЬ</button>
    </div>

    <nav><a href="#archive">ВИДЕО</a> <a href="#news">НОВОСТИ</a> <a href="#chat">ЧАТ</a></nav>

    <header><h1 class="logo">SAVE</h1></header>

    <div class="main-layout">
        <main>
            <section id="archive">
                <div class="section-title">Кинозал</div>
                <div class="main-video-container">
                    <div class="video-wrap">
                        <iframe id="mainPlayer" src="https://rutube.ru/play/embed/5f10027e2df6f3a60796ec5750ae8255/" allowFullScreen></iframe>
                    </div>
                </div>
                <div class="video-grid">
                    <div class="video-item"><div class="click-layer" onclick="changeVideo('5f10027e2df6f3a60796ec5750ae8255')"></div><iframe class="mini-player" src="https://rutube.ru/play/embed/5f10027e2df6f3a60796ec5750ae8255/"></iframe></div>
                    <div class="video-item"><div class="click-layer" onclick="changeVideo('9af2c2dbf03fccad84c890e4f79fc3e3')"></div><iframe class="mini-player" src="https://rutube.ru/play/embed/9af2c2dbf03fccad84c890e4f79fc3e3/"></iframe></div>
                    <div class="video-item"><div class="click-layer" onclick="changeVideo('8ea4875cdfb7fce72bb622fedc038f2e')"></div><iframe class="mini-player" src="https://rutube.ru/play/embed/8ea4875cdfb7fce72bb622fedc038f2e/"></iframe></div>
                </div>
            </section>

            <section id="news">
                <div class="section-title">Стена новостей</div>
                <div class="news-feed" id="newsFeed"></div>
            </section>
        </main>

        <aside>
            <div class="sidebar-box">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">ПОЗЫВНОЙ</div>
                <div class="input-group">
                    <input type="text" id="userNameInput" placeholder="Твой ник">
                    <button onclick="setUser()">OK</button>
                </div>
            </div>
            <div class="sidebar-box" id="chat">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">КУРИЛКА</div>
                <div class="chat-area" id="chatWindow"></div>
                <div class="input-group">
                    <input type="text" id="chatInput" placeholder="Пиши..." onkeypress="if(event.keyCode==13) sendMessage()">
                    <button onclick="sendMessage()">➤</button>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // --- ПАРАМЕТРЫ АДМИНА ---
        const ADMIN_USER = "SAVE";
        const ADMIN_PASS = "90s";

        let posts = JSON.parse(localStorage.getItem('vhs_posts')) || [
            {time: '01.03.2026', text: 'Добро пожаловать в проект SAVE. Для администрирования используй секретное сочетание клавиш.'}
        ];

        function renderPosts() {
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = posts.map(p => `
                <div class="post">
                    <span class="post-time">${p.time}</span>
                    <div>${p.text}</div>
                </div>
            `).reverse().join('');
        }

        function addPost() {
            const txt = prompt("ТЕКСТ НОВОСТИ (можно вставлять HTML-код видео):");
            if(txt) {
                posts.push({ time: new Date().toLocaleString(), text: txt });
                localStorage.setItem('vhs_posts', JSON.stringify(posts));
                renderPosts();
            }
        }

        // --- ВХОД В АДМИНКУ ---
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.shiftKey && e.keyCode === 76) {
                let user = prompt("ЛОГИН:");
                let pass = prompt("ПАРОЛЬ:");
                if(user === ADMIN_USER && pass === ADMIN_PASS) {
                    document.getElementById('adminBar').style.display = 'block';
                    alert("ДОСТУП РАЗРЕШЕН");
                } else {
                    alert("ОШИБКА ДОСТУПА");
                }
            }
        });

        function resetAll() { if(confirm("Сбросить все посты?")) { localStorage.clear(); location.reload(); } }

        function changeVideo(id) { document.getElementById('mainPlayer').src = `https://rutube.ru/play/embed/${id}/`; window.scrollTo({ top: 100, behavior: 'smooth' }); }

        // --- DENDY ---
        var nes = new jsnes.NES({
            onFrame: function(buf) {
                var ctx = document.getElementById('nes-canvas').getContext('2d');
                var img = ctx.getImageData(0,0,256,240);
                var b32 = new Uint32Array(img.data.buffer);
                for(var i=0; i<256*240; ++i) b32[i] = 0xFF000000 | buf[i];
                ctx.putImageData(img,0,0);
            }
        });
        function toggleNES() { document.getElementById('nes-sidebar').classList.toggle('active'); }
        function startNesGame(u) {
            var x = new XMLHttpRequest(); x.open("GET", u, true); x.overrideMimeType("text/plain; charset=x-user-defined");
            x.onload = function() { nes.loadROM(this.responseText); setInterval(()=>nes.frame(), 16); }; x.send();
        }
        const k = {38:4,40:5,37:6,39:7,88:0,90:1,16:2,13:3};
        window.onkeydown=(e)=>{if(k[e.keyCode]!==undefined){nes.buttonDown(1,k[e.keyCode]); e.preventDefault();}};
        window.onkeyup=(e)=>{if(k[e.keyCode]!==undefined)nes.buttonUp(1,k[e.keyCode]);};

        // --- ЧАТ ---
        let userNick = localStorage.getItem('vhs_user') || "Гость";
        function setUser() { let n = document.getElementById('userNameInput').value; if(n){userNick=n; localStorage.setItem('vhs_user', n); alert("Ник изменен!");} }
        function sendMessage() {
            let i = document.getElementById('chatInput');
            if(i.value) {
                document.getElementById('chatWindow').innerHTML += `<div style="margin-bottom:5px;"><b>${userNick}:</b> ${i.value}</div>`;
                i.value = "";
                document.getElementById('chatWindow').scrollTop = document.getElementById('chatWindow').scrollHeight;
            }
        }

        renderPosts();
    </script>
</body>
</html>
