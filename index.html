<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAVE | VHS DYNAMIC ARCHIVE & DENDY</title>
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <style>
        :root { --accent: #ff4500; --card-bg: rgba(15, 15, 15, 0.95); --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--text); background: #111; background-image: url('bg.jpg'); background-attachment: fixed; background-size: cover; overflow-x: hidden; }
        
        nav { background: rgba(0,0,0,0.9); padding: 15px; border-bottom: 2px solid var(--accent); text-align: center; position: sticky; top: 0; z-index: 100; }
        nav a { color: #fff; text-decoration: none; margin: 0 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        header { text-align: center; padding: 30px 20px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .logo { font-size: 5rem; letter-spacing: 5px; margin: 0; font-weight: 900; text-transform: uppercase; color: #fff; text-shadow: 2px 2px 0 #000, 0 0 20px rgba(255, 69, 0, 0.7); line-height: 1; }
        .bulb { font-size: 4rem; color: var(--accent); animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; text-shadow: 0 0 20px var(--accent); } }

        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .section-title { background: var(--accent); display: inline-block; padding: 6px 15px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; box-shadow: 4px 4px 0 #000; }
        
        /* Плеер */
        .main-video-container { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 30px; }
        .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; background: #000; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        /* Сетка видео */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .video-item { background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #333; position: relative; height: 180px; width: 100%; box-sizing: border-box; }
        .mini-player { width: 100%; height: 100%; border: none; pointer-events: none; opacity: 0.8; display: block; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; background: rgba(0,0,0,0); }

        .delete-btn { display: none; background: red; color: white; border: none; cursor: pointer; position: absolute; z-index: 20; top: 5px; right: 5px; padding: 5px 10px; border-radius: 4px; }
        body.admin-active .delete-btn { display: block; }
        #adminBar { position: fixed; top: 0; left: 0; width: 100%; background: var(--accent); color: white; padding: 10px; text-align: center; z-index: 2000; display: none; }

        /* ЭМУЛЯТОР */
        #nes-sidebar { position: fixed; left: -420px; top: 0; width: 400px; height: 100%; background: #111; border-right: 4px solid var(--accent); z-index: 1000; transition: 0.4s; padding: 15px; display: flex; flex-direction: column; overflow-y: auto; box-sizing: border-box; }
        #nes-sidebar.active { left: 0; }
        #nes-canvas { width: 100%; background: #000; border: 4px solid #333; border-radius: 4px; aspect-ratio: 256/240; }

        .touch-controls { display: none; margin-top: 20px; padding-bottom: 60px; user-select: none; }
        @media (max-width: 950px) { 
            .logo { font-size: 3rem; } .main-layout { grid-template-columns: 1fr; } 
            #nes-sidebar { width: 100%; left: -100%; } .touch-controls { display: block; }
            .video-item { height: 200px; }
        }

        .joypad-row { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-top: 30px; }
        .dpad-container { position: relative; width: 160px; height: 160px; background: #222; border-radius: 20px; touch-action: none; }
        .dpad-btn-vis { position: absolute; background: #333; border: 1px solid #444; display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; font-size: 1.2rem; pointer-events: none; }
        .d-u { top: 5px; left: 55px; } .d-d { bottom: 5px; left: 55px; } .d-l { left: 5px; top: 55px; } .d-r { right: 5px; top: 55px; }
        .d-active { background: var(--accent) !important; }

        .action-btns { display: flex; gap: 20px; }
        .a-btn { width: 75px; height: 75px; border-radius: 50%; background: #a00; font-size: 1.5rem; font-weight: 900; box-shadow: 0 5px 0 #600; touch-action: none; border: none; color: white; }
        .a-btn:active { transform: translateY(3px); box-shadow: none; }

        .s-btn { padding: 12px 25px; background: #222; border-radius: 5px; font-size: 0.8rem; border: 1px solid #444; color: #fff; touch-action: none; }
        .nes-toggle { position: fixed; left: 20px; bottom: 20px; background: var(--accent); color: white; border: 2px solid #fff; width: 65px; height: 65px; border-radius: 50%; z-index: 1001; font-size: 1.8rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px #000; touch-action: none; }

        .sidebar-box { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .chat-area { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.6); padding: 10px; font-size: 0.85rem; }
    </style>
</head>
<body id="mainBody">

    <div id="adminBar">
        🔐 ADMIN | 👁️: <span id="viewCount">0</span> | 
        <button onclick="addNewVideo()">+ КАССЕТА</button>
        <button onclick="addPost()">+ НОВОСТЬ</button>
        <button onclick="resetAll()">СБРОС</button>
        <button onclick="location.reload()">X</button>
    </div>

    <div id="dragBtn" class="nes-toggle">🎮</div>

    <div id="nes-sidebar">
        <h2 style="color:var(--accent); text-align:center;">DENDY ZONE</h2>
        <canvas id="nes-canvas" width="256" height="240"></canvas>
        <button style="width:100%; margin:15px 0; padding:15px; font-weight:bold; background:var(--accent); color:white; border:none; border-radius:8px;" onclick="startNesGame('Contra.nes')">CONTRA</button>
        <div class="touch-controls">
            <div class="joypad-row">
                <div class="dpad-container" id="touchDpad">
                    <div class="dpad-btn-vis d-u" id="vis-4">▲</div>
                    <div class="dpad-btn-vis d-l" id="vis-6">◀</div>
                    <div class="dpad-btn-vis d-r" id="vis-7">▶</div>
                    <div class="dpad-btn-vis d-d" id="vis-5">▼</div>
                </div>
                <div class="action-btns">
                    <button class="a-btn" onpointerdown="btnD(1)" onpointerup="btnU(1)" onpointercancel="btnU(1)">B</button>
                    <button class="a-btn" onpointerdown="btnD(0)" onpointerup="btnU(0)" onpointercancel="btnU(0)">A</button>
                </div>
            </div>
            <div style="display:flex; justify-content:center; gap:10px; margin-top:20px;">
                <button class="s-btn" onpointerdown="btnD(2)" onpointerup="btnU(2)">SELECT</button>
                <button class="s-btn" onpointerdown="btnD(3)" onpointerup="btnU(3)">START</button>
            </div>
        </div>
        <button style="padding:15px; margin-top:20px; background:#333; color:white; border:none;" onclick="toggleNES()">ЗАКРЫТЬ</button>
    </div>

    <nav><a href="#archive">АРХИВ</a> <a href="#news">НОВОСТИ</a></nav>
    <header><span class="bulb">💡</span><h1 class="logo">SAVE</h1></header>

    <div class="main-layout">
        <main>
            <section id="archive">
                <div class="section-title">VHS ПЛЕЕР</div>
                <div class="main-video-container"><div class="video-wrap"><iframe id="mainPlayer" src="" allowFullScreen></iframe></div></div>
                <div class="section-title">БИБЛИОТЕКА</div>
                <div class="video-grid" id="videoGrid"></div>
            </section>
            <section id="news">
                <div class="section-title">СТЕНА</div>
                <div id="newsFeed" class="news-feed"></div>
            </section>
        </main>
        <aside>
            <div class="sidebar-box">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">НИК</div>
                <div style="display:flex;gap:5px"><input type="text" id="userNameInput" style="flex:1;background:#000;color:#fff;border:1px solid #444;padding:5px;"><button onclick="setUser()">OK</button></div>
            </div>
            <div class="sidebar-box">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">ЧАТ</div>
                <div id="chatWindow" class="chat-area"></div>
                <div style="display:flex;gap:5px;margin-top:10px;"><input type="text" id="chatInput" style="flex:1;background:#000;color:#fff;border:1px solid #444;padding:5px;" onkeypress="if(event.keyCode==13) sendMessage()"><button onclick="sendMessage()">➤</button></div>
            </div>
        </aside>
    </div>

    <script>
        const ADMIN_LOGIN = "SAVE", ADMIN_PASS = "90s";
        let visits = parseInt(localStorage.getItem('vhs_visits') || "0");
        visits++; localStorage.setItem('vhs_visits', visits);

        // Ключевое место: Читаем базу видео. Если пусто - ставим дефолт.
        let vhsBox = JSON.parse(localStorage.getItem('vhs_box')) || [
            {type:'youtube', id:'dQw4w9WgXcQ'},
            {type:'rutube', id:'5f10027e2df6f3a60796ec5750ae8255'}
        ];
        let posts = JSON.parse(localStorage.getItem('vhs_posts')) || [{time:'01.03.2026', text:'SAVE START'}];
        let userNick = localStorage.getItem('vhs_user') || "Гость";

        function renderArchive() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = ''; // Очистка
            vhsBox.forEach((v, i) => {
                let u = v.type === 'youtube' ? `https://www.youtube.com/embed/${v.id}` : `https://rutube.ru/play/embed/${v.id}/`;
                grid.innerHTML += `
                <div class="video-item">
                    <button class="delete-btn" onclick="deleteVideo(${i})">X</button>
                    <div class="click-layer" onclick="changeVideo('${u}')"></div>
                    <iframe class="mini-player" src="${u}" loading="lazy"></iframe>
                </div>`;
            });
            if(vhsBox.length > 0 && !document.getElementById('mainPlayer').src) {
                changeVideo(vhsBox[0].type === 'youtube' ? `https://www.youtube.com/embed/${vhsBox[0].id}` : `https://rutube.ru/play/embed/${vhsBox[0].id}/`);
            }
        }

        function changeVideo(url) { document.getElementById('mainPlayer').src = url; window.scrollTo({top: 0, behavior: 'smooth'}); }
        
        function setUser() {
            let val = document.getElementById('userNameInput').value.trim();
            if(val === ADMIN_LOGIN && prompt("PASS:") === ADMIN_PASS) {
                document.body.classList.add('admin-active');
                document.getElementById('adminBar').style.display = 'block';
                document.getElementById('viewCount').innerText = visits;
                userNick = "ADMIN"; renderArchive();
            } else if(val) { userNick = val; localStorage.setItem('vhs_user', val); alert("Ник сохранен"); }
        }

        function addNewVideo() {
            let l = prompt("URL (Youtube или Rutube):"); if(!l) return;
            let type = l.includes('youtube') ? 'youtube' : 'rutube';
            let id = '';
            if(type === 'youtube') id = l.includes('v=') ? l.split('v=')[1].split('&')[0] : l.split('/').pop();
            else id = l.split('/').filter(p=>p).pop();
            if(id) { vhsBox.push({type, id}); localStorage.setItem('vhs_box', JSON.stringify(vhsBox)); renderArchive(); }
        }

        function deleteVideo(i) { vhsBox.splice(i, 1); localStorage.setItem('vhs_box', JSON.stringify(vhsBox)); renderArchive(); }
        function addPost() { let t = prompt("Текст:"); if(t) { posts.push({time: new Date().toLocaleString(), text: t}); localStorage.setItem('vhs_posts', JSON.stringify(posts)); renderPosts(); } }
        function renderPosts() { document.getElementById('newsFeed').innerHTML = posts.map((p, i) => `<div style="background:#000;padding:10px;margin-bottom:10px;border-left:3px solid var(--accent)"><small>${p.time}</small><div>${p.text}</div></div>`).reverse().join(''); }
        function sendMessage() { let i = document.getElementById('chatInput'); if(i.value) { document.getElementById('chatWindow').innerHTML += `<div><b>${userNick}:</b> ${i.value}</div>`; i.value = ""; document.getElementById('chatWindow').scrollTop = 9999; } }
        function resetAll() { if(confirm("Сбросить всё?")) { localStorage.clear(); location.reload(); } }

        /* ЭМУЛЯТОР */
        var nes = new jsnes.NES({ onFrame: (buf) => {
            var ctx = document.getElementById('nes-canvas').getContext('2d'), img = ctx.getImageData(0,0,256,240), b32 = new Uint32Array(img.data.buffer);
            for(var i=0; i<256*240; ++i) b32[i] = 0xFF000000 | buf[i];
            ctx.putImageData(img,0,0);
        }});
        function toggleNES() { document.getElementById('nes-sidebar').classList.toggle('active'); }
        function startNesGame(u) { var x = new XMLHttpRequest(); x.open("GET", u, true); x.overrideMimeType("text/plain; charset=x-user-defined"); x.onload = function() { nes.loadROM(this.responseText); if(!window.nesInt) window.nesInt = setInterval(()=>nes.frame(), 16); }; x.send(); }
        function btnD(k) { nes.buttonDown(1, k); }
        function btnU(k) { nes.buttonUp(1, k); }

        /* DPAD */
        const dpad = document.getElementById('touchDpad');
        function handleDpad(e) {
            if (e.type === 'pointerup' || e.type === 'pointercancel') {
                [4,5,6,7].forEach(k => { nes.buttonUp(1, k); document.getElementById('vis-'+k).classList.remove('d-active'); });
                return;
            }
            const rect = dpad.getBoundingClientRect();
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            const keys = [];
            if (y < 0.4) keys.push(4); if (y > 0.6) keys.push(5);
            if (x < 0.4) keys.push(6); if (x > 0.6) keys.push(7);
            [4,5,6,7].forEach(k => {
                if (keys.includes(k)) { nes.buttonDown(1, k); document.getElementById('vis-'+k).classList.add('d-active'); }
                else { nes.buttonUp(1, k); document.getElementById('vis-'+k).classList.remove('d-active'); }
            });
        }
        dpad.addEventListener('pointerdown', handleDpad);
        dpad.addEventListener('pointermove', (e) => { if(e.buttons) handleDpad(e); });
        dpad.addEventListener('pointerup', handleDpad); dpad.addEventListener('pointercancel', handleDpad);

        /* DRAG BUTTON */
        const dragBtn = document.getElementById('dragBtn');
        let isDragging = false, startX, startY, moveDist = 0;
        dragBtn.onpointerdown = (e) => { isDragging = true; moveDist = 0; startX = e.clientX - dragBtn.offsetLeft; startY = e.clientY - dragBtn.offsetTop; dragBtn.setPointerCapture(e.pointerId); };
        dragBtn.onpointermove = (e) => { if (!isDragging) return; let x = e.clientX - startX, y = e.clientY - startY; moveDist += 5; dragBtn.style.left = x+'px'; dragBtn.style.top = y+'px'; dragBtn.style.bottom='auto'; dragBtn.style.right='auto'; };
        dragBtn.onpointerup = () => { isDragging = false; if (moveDist < 10) toggleNES(); };

        renderArchive(); renderPosts();
    </script>
</body>
</html>
