<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVE | VHS ARCHIVE</title>
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <style>
        :root { --accent: #ff4500; --card-bg: rgba(15, 15, 15, 0.9); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: white; background: url('bg.jpg') #111 no-repeat center center fixed; background-size: cover; }
        nav { background: rgba(0,0,0,0.9); padding: 15px; border-bottom: 2px solid var(--accent); text-align: center; }
        header { text-align: center; padding: 20px; }
        .logo { font-size: 3rem; letter-spacing: 10px; font-weight: 900; margin: 0; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .section-title { background: var(--accent); display: inline-block; padding: 5px 15px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; }

        /* ГЛАВНЫЙ ПЛЕЕР */
        .main-video-container { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 25px; }
        .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* ГАЛЕРЕЯ КАССЕТ */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .video-item { background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #333; position: relative; transition: 0.3s; }
        .video-item:hover { border-color: var(--accent); transform: scale(1.02); }
        
        /* Мини-плеер теперь выше, чтобы название Rutube было видно */
        .mini-player { width: 100%; height: 160px; border: none; pointer-events: none; }
        /* Слой для клика, который не закрывает название видео сверху */
        .click-layer { position: absolute; bottom: 0; left: 0; width: 100%; height: 70%; z-index: 10; cursor: pointer; }

        /* DENDY */
        #nes-sidebar { position: fixed; left: -400px; top: 0; width: 380px; height: 100%; background: #151515; border-right: 4px solid var(--accent); z-index: 1000; transition: 0.5s; padding: 20px; box-sizing: border-box; }
        #nes-sidebar.active { left: 0; }
        .nes-toggle { position: fixed; left: 20px; bottom: 20px; background: var(--accent); color: white; border: 2px solid #fff; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; z-index: 1001; font-size: 1.5rem; }
        #nes-canvas { width: 100%; background: #000; image-rendering: pixelated; }

        @media (max-width: 950px) { .main-layout { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <button class="nes-toggle" onclick="toggleNES()">🎮</button>

    <div id="nes-sidebar">
        <h2 style="color:var(--accent); text-align:center;">DENDY ZONE</h2>
        <canvas id="nes-canvas" width="256" height="240"></canvas>
        <button style="width:100%; margin-top:10px; padding: 10px; font-weight:bold; cursor:pointer;" onclick="startNesGame('Contra.nes')">ИГРАТЬ В CONTRA</button>
        <p style="font-size: 0.7rem; color: gray; text-align:center;">X - прыжок, Z - огонь, Стрелки - бег</p>
    </div>

    <nav><a href="#">АРХИВ ВИДЕОКАССЕТ</a></nav>
    <header><h1 class="logo">SAVE</h1></header>

    <div class="main-layout">
        <main>
            <section>
                <div class="section-title">Просмотр</div>
                <div class="main-video-container">
                    <div class="video-wrap">
                        <iframe id="mainPlayer" src="https://rutube.ru/play/embed/5f10027e2df6f3a60796ec5750ae8255/" allowFullScreen></iframe>
                    </div>
                </div>

                <div class="section-title">Библиотека</div>
                <div class="video-grid">
                    
                    <div class="video-item">
                        <div class="click-layer" onclick="changeVideo('5f10027e2df6f3a60796ec5750ae8255')"></div>
                        <iframe class="mini-player" src="https://rutube.ru/play/embed/5f10027e2df6f3a60796ec5750ae8255/"></iframe>
                    </div>

                    <div class="video-item">
                        <div class="click-layer" onclick="changeVideo('9af2c2dbf03fccad84c890e4f79fc3e3')"></div>
                        <iframe class="mini-player" src="https://rutube.ru/play/embed/9af2c2dbf03fccad84c890e4f79fc3e3/"></iframe>
                    </div>

                    <div class="video-item">
                        <div class="click-layer" onclick="changeVideo('8ea4875cdfb7fce72bb622fedc038f2e')"></div>
                        <iframe class="mini-player" src="https://rutube.ru/play/embed/8ea4875cdfb7fce72bb622fedc038f2e/"></iframe>
                    </div>

                </div>
            </section>
        </main>

        <aside>
            <div style="background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #333;">
                <div style="color:var(--accent); font-weight:bold; margin-bottom: 10px;">ИНФО</div>
                <p style="font-size: 0.8rem; color: #ccc; line-height: 1.4;">
                    Кликай на любую кассету, чтобы запустить её в плеере. Все названия подтягиваются автоматически из Rutube.
                </p>
            </div>
        </aside>
    </div>

    <script>
        // Функция смены видео
        function changeVideo(id) {
            document.getElementById('mainPlayer').src = `https://rutube.ru/play/embed/${id}/`;
            window.scrollTo({ top: 100, behavior: 'smooth' });
        }

        // ЭМУЛЯТОР (Твое любимое рабочее управление)
        var nes = new jsnes.NES({
            onFrame: function(buf) {
                var canvas = document.getElementById('nes-canvas');
                var ctx = canvas.getContext('2d');
                var img = ctx.getImageData(0,0,256,240);
                var b = new ArrayBuffer(img.data.length);
                var b8 = new Uint8ClampedArray(b);
                var b32 = new Uint32Array(b);
                for(var i=0; i<256*240; ++i) b32[i] = 0xFF000000 | buf[i];
                img.data.set(b8); ctx.putImageData(img,0,0);
            }
        });
        function toggleNES() { document.getElementById('nes-sidebar').classList.toggle('active'); }
        function startNesGame(u) {
            var x = new XMLHttpRequest(); x.open("GET", u, true); x.overrideMimeType("text/plain; charset=x-user-defined");
            x.onload = function() { nes.loadROM(this.responseText); setInterval(()=>nes.frame(), 16); }; x.send();
        }
        const k = {38:4,40:5,37:6,39:7,88:0,90:1,16:2,13:3};
        window.onkeydown=(e)=>{if(k[e.keyCode]!==undefined){nes.buttonDown(1,k[e.keyCode]); e.preventDefault();}};
        window.onkeyup=(e)=>{if(k[e.keyCode]!==undefined)nes.buttonUp(1,k[e.keyCode]);};
    </script>
</body>
</html>
