<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVE | VHS DYNAMIC ARCHIVE</title>
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <style>
        :root { --accent: #ff4500; --card-bg: rgba(15, 15, 15, 0.95); --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--text); background: url('bg.jpg') #111 no-repeat center center fixed; background-size: cover; }
        nav { background: rgba(0,0,0,0.9); padding: 15px; border-bottom: 2px solid var(--accent); text-align: center; position: sticky; top: 0; z-index: 100; }
        nav a { color: #fff; text-decoration: none; margin: 0 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        header { text-align: center; padding: 30px 20px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .logo { font-size: 5rem; letter-spacing: 5px; margin: 0; font-weight: 900; text-transform: uppercase; color: #fff; text-shadow: 2px 2px 0 #000, 0 0 20px rgba(255, 69, 0, 0.7); line-height: 1; }
        .bulb { font-size: 4rem; color: var(--accent); animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { opacity: 0.5; } to { opacity: 1; text-shadow: 0 0 25px var(--accent); } }

        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; max-width: 1400px; margin: 0 auto; padding: 20px; }
        .section-title { background: var(--accent); display: inline-block; padding: 6px 15px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; box-shadow: 4px 4px 0 #000; }

        .main-video-container { background: var(--card-bg); border: 1px solid #333; border-radius: 12px; padding: 15px; margin-bottom: 30px; }
        .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .video-item { background: #000; border-radius: 8px; overflow: hidden; border: 2px solid #333; position: relative; height: 180px; }
        .mini-player { width: 100%; height: 100%; border: none; pointer-events: none; opacity: 0.8; }
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; }

        .delete-btn { position: absolute; top: 8px; right: 8px; background: red; color: white; border: none; border-radius: 50%; width: 30px; height: 30px; cursor: pointer; z-index: 20; display: none; }
        .post-delete-btn { float: right; color: var(--accent); border: 1px solid var(--accent); background: none; cursor: pointer; display: none; padding: 2px 5px; font-size: 0.7rem; }
        body.admin-active .delete-btn, body.admin-active .post-delete-btn { display: block; }

        .news-feed { background: var(--card-bg); border-radius: 12px; padding: 20px; border: 1px solid #333; }
        .post { background: #000; border: 1px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        
        /* Фикс для видео в постах */
        .post-video-container { width: 100%; margin-bottom: 10px; border-radius: 6px; overflow: hidden; background: #000; line-height: 0; }
        .post-video-container iframe { width: 100%; border: none; min-height: 300px; }

        .sidebar-box { background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid #333; margin-bottom: 20px; }
        .chat-area { height: 300px; overflow-y: auto; background: rgba(0,0,0,0.6); padding: 10px; font-size: 0.85rem; border-radius: 8px; }
        .input-group { display: flex; gap: 8px; margin-top: 10px; }
        .input-group input { flex: 1; background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 4px; }
        .input-group button { background: var(--accent); border: none; color: white; padding: 0 12px; border-radius: 4px; cursor: pointer; }

        #adminBar { position: fixed; top: 0; left: 0; width: 100%; background: var(--accent); color: white; padding: 10px; text-align: center; z-index: 2000; display: none; }
        #adminBar button { background: white; border: none; margin-left: 15px; cursor: pointer; padding: 4px 15px; border-radius: 4px; font-weight: bold; }

        .nes-toggle { position: fixed; left: 20px; bottom: 20px; background: var(--accent); color: white; border: 2px solid #fff; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; z-index: 1001; }
        #nes-sidebar { position: fixed; left: -400px; top: 0; width: 380px; height: 100%; background: #151515; border-right: 4px solid var(--accent); z-index: 1000; transition: 0.5s; padding: 20px; }
        #nes-sidebar.active { left: 0; }
        #nes-canvas { width: 100%; background: #000; }
    </style>
</head>
<body id="mainBody">

    <div id="adminBar">
        🔐 ADMIN | <button onclick="addNewVideo()">+ КАССЕТА</button> <button onclick="addPost()">+ НОВОСТЬ</button> <button onclick="resetAll()">СБРОС КЭША</button> <button onclick="location.reload()">ВЫХОД</button>
    </div>

    <button class="nes-toggle" onclick="toggleNES()">🎮</button>
    <div id="nes-sidebar">
        <h2 style="color:var(--accent); text-align:center;">DENDY</h2>
        <canvas id="nes-canvas" width="256" height="240"></canvas>
        <button style="width:100%; padding:10px;" onclick="startNesGame('Contra.nes')">CONTRA</button>
    </div>

    <nav><a href="#archive">АРХИВ</a> <a href="#news">НОВОСТИ</a></nav>
    <header><span class="bulb">💡</span><h1 class="logo">SAVE</h1></header>

    <div class="main-layout">
        <main>
            <section id="archive">
                <div class="section-title">Плеер</div>
                <div class="main-video-container"><div class="video-wrap"><iframe id="mainPlayer" src="" allowFullScreen></iframe></div></div>
                <div class="section-title">Библиотека</div>
                <div class="video-grid" id="videoGrid"></div>
            </section>
            <section id="news">
                <div class="section-title">Стена</div>
                <div id="newsFeed" class="news-feed"></div>
            </section>
        </main>
        <aside>
            <div class="sidebar-box">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">ПОЗЫВНОЙ</div>
                <div class="input-group"><input type="text" id="userNameInput"><button onclick="setUser()">OK</button></div>
            </div>
            <div class="sidebar-box">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:10px;">ЧАТ</div>
                <div id="chatWindow" class="chat-area"></div>
                <div class="input-group"><input type="text" id="chatInput" onkeypress="if(event.keyCode==13) sendMessage()"><button onclick="sendMessage()">➤</button></div>
            </div>
        </aside>
    </div>

    <script>
        const ADMIN_LOGIN = "SAVE", ADMIN_PASS = "90s";
        let vhsBox = JSON.parse(localStorage.getItem('vhs_box')) || [{ type: 'rutube', id: '5f10027e2df6f3a60796ec5750ae8255' }];
        let posts = JSON.parse(localStorage.getItem('vhs_posts')) || [];
        let userNick = localStorage.getItem('vhs_user') || "Гость";
        let isAdmin = false;

        function renderArchive() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = vhsBox.map((v, i) => {
                let url = v.type === 'youtube' ? `https://www.youtube.com/embed/${v.id}` : `https://rutube.ru/play/embed/${v.id}/`;
                return `<div class="video-item"><button class="delete-btn" onclick="deleteVideo(${i})">🗑️</button><div class="click-layer" onclick="changeVideo('${url}')"></div><iframe class="mini-player" src="${url}"></iframe></div>`;
            }).join('');
            if(vhsBox.length > 0 && !document.getElementById('mainPlayer').src) changeVideo(vhsBox[0].type === 'youtube' ? `https://www.youtube.com/embed/${vhsBox[0].id}` : `https://rutube.ru/play/embed/${vhsBox[0].id}/`);
        }

        function changeVideo(url) { document.getElementById('mainPlayer').src = url; }

        function setUser() {
            let val = document.getElementById('userNameInput').value.trim();
            if(val === ADMIN_LOGIN && prompt("ПАРОЛЬ:") === ADMIN_PASS) {
                isAdmin = true; document.getElementById('adminBar').style.display = 'block'; document.getElementById('mainBody').classList.add('admin-active');
                userNick = "ADMIN"; renderArchive(); renderPosts();
            } else if(val) { userNick = val; localStorage.setItem('vhs_user', userNick); }
        }

        function addPost() {
            if(!isAdmin) return;
            let text = prompt("Текст новости:");
            let link = prompt("Ссылка (YouTube, Rutube или Telegram):", "");
            let embed = "";

            if(link) {
                if(link.includes('t.me')) {
                    // ПРЕВРАЩАЕМ ССЫЛКУ ТГ В EMBED
                    embed = link.includes('?embed=1') ? link : link + '?embed=1';
                } else if(link.includes('youtube') || link.includes('youtu.be')) {
                    let id = link.includes('v=') ? link.split('v=')[1].split('&')[0] : link.split('/').pop();
                    embed = `https://www.youtube.com/embed/${id}`;
                } else if(link.includes('rutube')) {
                    let id = link.split('/video/')[1].replace('/', '');
                    embed = `https://rutube.ru/play/embed/${id}/`;
                } else { embed = link; }
            }
            posts.push({time: new Date().toLocaleString(), text: text, vidUrl: embed});
            localStorage.setItem('vhs_posts', JSON.stringify(posts)); renderPosts();
        }

        function renderPosts() {
            document.getElementById('newsFeed').innerHTML = posts.map((p, i) => `
                <div class="post">
                    <button class="post-delete-btn" onclick="deletePost(${i})">Удалить</button>
                    ${p.vidUrl ? `<div class="post-video-container"><iframe src="${p.vidUrl}" allowfullscreen></iframe></div>` : ""}
                    <small style="color:var(--accent)">${p.time}</small><br>
                    <div style="margin-top:10px;">${p.text}</div>
                </div>`).reverse().join('');
        }

        function deletePost(i) { posts.splice(i, 1); localStorage.setItem('vhs_posts', JSON.stringify(posts)); renderPosts(); }
        function addNewVideo() { /* логика из прошлого кода */ }
        function deleteVideo(i) { vhsBox.splice(i, 1); localStorage.setItem('vhs_box', JSON.stringify(vhsBox)); renderArchive(); }
        function sendMessage() {
            let i = document.getElementById('chatInput');
            if(i.value.trim()) {
                document.getElementById('chatWindow').innerHTML += `<div><b>${userNick}:</b> ${i.value}</div>`;
                i.value = ""; document.getElementById('chatWindow').scrollTop = document.getElementById('chatWindow').scrollHeight;
            }
        }
        function resetAll() { localStorage.clear(); location.reload(); }

        var nes = new jsnes.NES({ onFrame: (buf) => {
            var ctx = document.getElementById('nes-canvas').getContext('2d');
            var img = ctx.getImageData(0,0,256,240);
            var b32 = new Uint32Array(img.data.buffer);
            for(var i=0; i<256*240; ++i) b32[i] = 0xFF000000 | buf[i];
            ctx.putImageData(img,0,0);
        }});
        function toggleNES() { document.getElementById('nes-sidebar').classList.toggle('active'); }
        function startNesGame(u) { var x = new XMLHttpRequest(); x.open("GET", u, true); x.overrideMimeType("text/plain; charset=x-user-defined"); x.onload = function() { nes.loadROM(this.responseText); setInterval(()=>nes.frame(), 16); }; x.send(); }

        renderArchive(); renderPosts();
    </script>
</body>
</html>
