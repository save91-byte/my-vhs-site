<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAVE | VHS & DENDY MOBILE</title>
    <script src="https://unpkg.com/jsnes/dist/jsnes.min.js"></script>
    <style>
        :root { --accent: #ff4500; --card-bg: rgba(15, 15, 15, 0.95); --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; color: var(--text); background: #111; overflow-x: hidden; }
        nav { background: rgba(0,0,0,0.9); padding: 15px; border-bottom: 2px solid var(--accent); text-align: center; }
        nav a { color: #fff; text-decoration: none; margin: 0 10px; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        
        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1400px; margin: 0 auto; padding: 10px; }
        .section-title { background: var(--accent); display: inline-block; padding: 5px 12px; margin-bottom: 15px; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }

        .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 8px; overflow: hidden; }
        .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

        /* ЭМУЛЯТОР И УПРАВЛЕНИЕ */
        #nes-sidebar { position: fixed; right: -100%; top: 0; width: 100%; height: 100%; background: #000; z-index: 2000; transition: 0.4s; display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
        #nes-sidebar.active { right: 0; }
        #nes-canvas { width: 95%; max-width: 512px; background: #000; image-rendering: pixelated; border: 4px solid #333; }

        /* ВИРТУАЛЬНЫЙ ДЖОЙСТИК */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 90%; max-width: 500px; margin-top: 20px; user-select: none; }
        .d-pad { display: grid; grid-template-areas: ". up ." "left . right" ". down ."; gap: 5px; }
        .btn-game { background: #333; color: #fff; border: 2px solid #555; border-radius: 10px; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-weight: bold; active { background: var(--accent); } }
        .btn-up { grid-area: up; margin: 0 auto; } .btn-down { grid-area: down; margin: 0 auto; }
        .btn-left { grid-area: left; } .btn-right { grid-area: right; }
        
        .action-btns { display: flex; gap: 15px; align-items: center; justify-content: flex-end; }
        .btn-round { width: 70px; height: 70px; border-radius: 50%; background: #a00; border: 3px solid #600; color: #fff; font-size: 1.2rem; }
        
        .system-btns { display: flex; gap: 20px; margin-top: 20px; }
        .btn-sys { background: #555; padding: 10px 20px; border-radius: 5px; border: none; color: white; text-transform: uppercase; font-size: 0.7rem; }

        .nes-toggle { position: fixed; right: 20px; bottom: 20px; background: var(--accent); color: white; border: 2px solid #fff; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; z-index: 1001; font-size: 1.5rem; }

        @media (max-width: 950px) { .main-layout { grid-template-columns: 1fr; } .logo { font-size: 2.5rem; } }
    </style>
</head>
<body>

    <button class="nes-toggle" onclick="toggleNES()">🎮</button>

    <div id="nes-sidebar">
        <button onclick="toggleNES()" style="position:absolute; top:10px; left:10px; background:none; border:none; color:white; font-size:1.5rem;">✕</button>
        <canvas id="nes-canvas" width="256" height="240"></canvas>
        
        <div class="system-btns">
            <button class="btn-sys" onpointerdown="nes.buttonDown(1, 3)" onpointerup="nes.buttonUp(1, 3)">START</button>
            <button class="btn-sys" onpointerdown="nes.buttonDown(1, 2)" onpointerup="nes.buttonUp(1, 2)">SELECT</button>
        </div>

        <div class="controls">
            <div class="d-pad">
                <div class="btn-game btn-up" onpointerdown="nes.buttonDown(1, 4)" onpointerup="nes.buttonUp(1, 4)">▲</div>
                <div class="btn-game btn-left" onpointerdown="nes.buttonDown(1, 6)" onpointerup="nes.buttonUp(1, 6)">◀</div>
                <div class="btn-game btn-right" onpointerdown="nes.buttonDown(1, 7)" onpointerup="nes.buttonUp(1, 7)">▶</div>
                <div class="btn-game btn-down" onpointerdown="nes.buttonDown(1, 5)" onpointerup="nes.buttonUp(1, 5)">▼</div>
            </div>
            <div class="action-btns">
                <div class="btn-game btn-round" onpointerdown="nes.buttonDown(1, 1)" onpointerup="nes.buttonUp(1, 1)">B</div>
                <div class="btn-game btn-round" onpointerdown="nes.buttonDown(1, 0)" onpointerup="nes.buttonUp(1, 0)">A</div>
            </div>
        </div>
        
        <button class="btn-sys" style="margin-top:30px; background:var(--accent);" onclick="startNesGame('Contra.nes')">ЗАГРУЗИТЬ CONTRA</button>
    </div>

    <nav><a href="#archive">АРХИВ</a> <a href="#news">НОВОСТИ</a></nav>

    <div class="main-layout">
        <main>
            <section id="archive">
                <div class="section-title">VHS PLAYER</div>
                <div class="video-wrap"><iframe id="mainPlayer" src="" allowFullScreen></iframe></div>
            </section>
        </main>
    </div>

    <script>
        var nes = new jsnes.NES({ onFrame: (buf) => {
            var ctx = document.getElementById('nes-canvas').getContext('2d');
            var img = ctx.getImageData(0,0,256,240);
            var b32 = new Uint32Array(img.data.buffer);
            for(var i=0; i<256*240; ++i) b32[i] = 0xFF000000 | buf[i];
            ctx.putImageData(img,0,0);
        }});

        function toggleNES() { document.getElementById('nes-sidebar').classList.toggle('active'); }
        
        function startNesGame(u) { 
            var x = new XMLHttpRequest(); 
            x.open("GET", u, true); 
            x.overrideMimeType("text/plain; charset=x-user-defined"); 
            x.onload = function() { 
                nes.loadROM(this.responseText); 
                if(!window.nesInterval) window.nesInterval = setInterval(()=>nes.frame(), 16); 
            }; 
            x.send(); 
        }

        // Поддержка клавиатуры для ПК тоже осталась
        const k = {38:4,40:5,37:6,39:7,88:0,90:1,16:2,13:3};
        window.onkeydown=(e)=>{if(k[e.keyCode]!==undefined)nes.buttonDown(1,k[e.keyCode]);};
        window.onkeyup=(e)=>{if(k[e.keyCode]!==undefined)nes.buttonUp(1,k[e.keyCode]);};
    </script>
</body>
</html>
