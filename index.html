<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAVE | VHS DATABASE</title>
    <style>
        :root { --accent: #ff4500; --card-bg: rgba(20, 20, 20, 0.95); }
        body { 
            margin: 0; font-family: 'Tahoma', sans-serif; color: #fff; 
            background: #000; background-image: radial-gradient(#333 1px, transparent 1px); background-size: 20px 20px;
            background-attachment: fixed;
        }
        
        /* ШАПКА */
        header { text-align: center; padding: 40px; display: flex; align-items: center; justify-content: center; gap: 20px; }
        .logo { font-size: 5rem; letter-spacing: 15px; font-weight: 900; text-shadow: 0 0 20px var(--accent); margin: 0; }
        .bulb { font-size: 4rem; text-shadow: 0 0 20px var(--accent); animation: flicker 3s infinite; }
        @keyframes flicker { 0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; } 20%, 22%, 24%, 55% { opacity: 0.3; } }

        /* ПАНЕЛЬ АДМИНА */
        #adminBar { position: fixed; top: 0; width: 100%; background: var(--accent); padding: 10px; z-index: 9999; text-align: center; display: none; box-shadow: 0 5px 20px #000; }
        #adminBar button { background: #000; color: #fff; border: 1px solid #fff; padding: 5px 15px; cursor: pointer; font-weight: bold; margin: 0 5px; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; display: grid; grid-template-columns: 1fr 300px; gap: 30px; }

        /* ПЛЕЕР */
        .screen-box { background: #111; border: 4px solid #333; border-radius: 10px; padding: 10px; margin-bottom: 30px; position: relative; }
        .viewport { position: relative; padding-bottom: 56.25%; height: 0; background: #000; overflow: hidden; }
        .viewport iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .noise { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: url('https://media.giphy.com/media/oEI9uWUPr9XRvA972K/giphy.gif'); opacity: 0.05; pointer-events: none; }

        /* КАССЕТЫ */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .tape { 
            background: #1a1a1a; border: 1px solid #333; height: 150px; position: relative; 
            cursor: pointer; transition: 0.2s; border-radius: 4px; overflow: hidden;
            display: flex; flex-direction: column; box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
        }
        .tape:hover { transform: scale(1.03); border-color: var(--accent); }
        .tape-img { width: 100%; height: 100px; background: #222; background-size: cover; background-position: center; }
        .tape-label { background: #fff; color: #000; margin: 5px; padding: 3px 10px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; flex-grow: 1; border-left: 10px solid var(--accent); }

        /* КНОПКИ УДАЛЕНИЯ */
        .del { position: absolute; top: 5px; right: 5px; background: red; color: white; border: none; width: 25px; height: 25px; cursor: pointer; border-radius: 50%; display: none; z-index: 10; font-weight: bold; }
        body.admin-mode .del { display: block; }

        /* САЙДБАР */
        .side-block { background: rgba(20,20,20,0.8); border: 1px solid #333; padding: 15px; margin-bottom: 20px; }
        #chat { height: 200px; overflow-y: auto; font-size: 0.8rem; background: #000; padding: 10px; margin-bottom: 10px; border: 1px solid #222; }

        /* ПОСТЫ */
        .post { background: #111; border-left: 4px solid var(--accent); padding: 15px; margin-bottom: 15px; position: relative; }

        @media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body id="main">

    <div id="adminBar">
        <span style="font-weight: bold;">[ SAVE ADMIN ]</span>
        <button onclick="addTape()">+ ДОБАВИТЬ КАССЕТУ</button>
        <button onclick="addNews()">+ НОВОСТЬ</button>
        <button onclick="clearData()" style="color: red;">ОЧИСТИТЬ ВСЁ</button>
        <button onclick="location.reload()">ВЫХОД</button>
    </div>

    <header>
        <span class="bulb">💡</span>
        <h1 class="logo">SAVE</h1>
    </header>

    <div class="container">
        <main>
            <div class="screen-box">
                <div class="viewport" id="player">
                    <div style="color: #333; text-align: center; padding-top: 20%; font-size: 2rem; font-weight: bold;">INSERT TAPE</div>
                    <div class="noise"></div>
                </div>
            </div>

            <h2 style="border-bottom: 2px solid var(--accent); padding-bottom: 10px;">АРХИВ ВИДЕОКАССЕТ</h2>
            <div class="grid" id="tapeGrid"></div>

            <h2 style="border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 50px;">ЛЕНТА НОВОСТЕЙ</h2>
            <div id="newsFeed"></div>
        </main>

        <aside>
            <div class="side-block">
                <div style="color: var(--accent); font-weight: bold; margin-bottom: 10px;">ID ПОЛЬЗОВАТЕЛЯ:</div>
                <input type="text" id="nickInp" placeholder="Твой ник..." style="width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 8px; box-sizing: border-box;">
                <button onclick="doLogin()" style="width: 100%; margin-top: 10px; background: var(--accent); color: #fff; border: none; padding: 8px; cursor: pointer; font-weight: bold;">ВОЙТИ</button>
            </div>

            <div class="side-block">
                <div style="color: var(--accent); font-weight: bold; margin-bottom: 10px;">КУРИЛКА (ЧАТ):</div>
                <div id="chat"></div>
                <input type="text" id="msgInp" style="width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 5px; box-sizing: border-box;" onkeypress="if(event.keyCode==13) sendMsg()">
            </div>
        </aside>
    </div>

    <script>
        // Исходные данные
        const startTapes = [
            { type: 'youtube', id: 'dQw4w9WgXcQ', name: 'RICK ASTLEY - NEVER GONNA GIVE YOU UP' },
            { type: 'rutube', id: '5f10027e2df6f3a60796ec5750ae8255', name: 'RUTUBE PREVIEW VIDEO' }
        ];
        const startNews = [{ date: '01.03.2026', text: 'СИСТЕМА SAVE ИНИЦИАЛИЗИРОВАНА. ВСЕ СИСТЕМЫ В НОРМЕ.' }];

        let tapes = JSON.parse(localStorage.getItem('VHS_TAPES')) || startTapes;
        let news = JSON.parse(localStorage.getItem('VHS_NEWS')) || startNews;
        let myNick = localStorage.getItem('VHS_NICK') || "Guest";
        let isAdm = false;

        function refresh() {
            // Рисуем кассеты
            const grid = document.getElementById('tapeGrid');
            grid.innerHTML = tapes.map((t, i) => {
                // Если Ютуб - берем картинку с их сервера, если Рутуб - ставим VHS заглушку
                let img = t.type === 'youtube' ? `https://img.youtube.com/vi/${t.id}/mqdefault.jpg` : 'https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXN3bmN3bmN3bmN3bmN3bmN3bmN3bmN3bmN3bmN3bmN3bmN3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/oEI9uWUPr9XRvA972K/giphy.gif';
                return `
                <div class="tape" onclick="playVideo('${t.type}', '${t.id}')">
                    <button class="del" onclick="event.stopPropagation(); delTape(${i})">×</button>
                    <div class="tape-img" style="background-image: url('${img}')"></div>
                    <div class="tape-label">${t.name}</div>
                </div>`;
            }).join('');

            // Рисуем новости
            const feed = document.getElementById('newsFeed');
            feed.innerHTML = news.map((n, i) => `
                <div class="post">
                    <button class="del" onclick="delNews(${i})" style="float:right; border-radius:0;">УДАЛИТЬ</button>
                    <small style="color:var(--accent)">[${n.date}]</small><br>${n.text}
                </div>`).reverse().join('');

            localStorage.setItem('VHS_TAPES', JSON.stringify(tapes));
            localStorage.setItem('VHS_NEWS', JSON.stringify(news));
        }

        function playVideo(type, id) {
            let url = type === 'youtube' ? `https://www.youtube.com/embed/${id}?autoplay=1` : `https://rutube.ru/play/embed/${id}/?autoplay=1`;
            document.getElementById('player').innerHTML = `<iframe src="${url}" allow="autoplay; fullscreen" allowfullscreen></iframe><div class="noise"></div>`;
            window.scrollTo({ top: 100, behavior: 'smooth' });
        }

        function doLogin() {
            let val = document.getElementById('nickInp').value.trim();
            if(val === "SAVE") {
                if(prompt("PASSWORD:") === "90s") {
                    isAdm = true;
                    document.getElementById('adminBar').style.display = 'block';
                    document.body.classList.add('admin-mode');
                    myNick = "ADMIN";
                    refresh();
                    alert("ACCESS GRANTED");
                }
            } else if(val) {
                myNick = val;
                localStorage.setItem('VHS_NICK', myNick);
                alert("Привет, " + myNick);
            }
        }

        function addTape() {
            let link = prompt("ССЫЛКА (YOUTUBE / RUTUBE):");
            if(!link) return;
            let n = prompt("НАЗВАНИЕ КАССЕТЫ:");
            let obj = { type: '', id: '', name: n || 'UNTITLED' };
            
            if(link.includes('youtube') || link.includes('youtu.be')) {
                obj.type = 'youtube';
                obj.id = link.includes('v=') ? link.split('v=')[1].split('&')[0] : link.split('/').pop();
            } else if(link.includes('rutube')) {
                obj.type = 'rutube';
                obj.id = link.split('/video/')[1].replace('/','');
            }
            
            if(obj.id) { tapes.push(obj); refresh(); }
        }

        function delTape(i) { if(confirm("УДАЛИТЬ КАССЕТУ?")) { tapes.splice(i, 1); refresh(); } }
        function addNews() { let t = prompt("ТЕКСТ НОВОСТИ:"); if(t) { news.push({date: new Date().toLocaleDateString(), text: t}); refresh(); } }
        function delNews(i) { if(confirm("УДАЛИТЬ НОВОСТЬ?")) { news.splice(i, 1); refresh(); } }
        function clearData() { if(confirm("ПОЛНЫЙ СБРОС?")) { localStorage.clear(); location.reload(); } }

        function sendMsg() {
            let i = document.getElementById('msgInp');
            if(i.value) {
                document.getElementById('chat').innerHTML += `<div><b>${myNick}:</b> ${i.value}</div>`;
                i.value = "";
                document.getElementById('chat').scrollTop = 9999;
            }
        }

        // Запуск
        refresh();
    </script>
</body>
</html>
